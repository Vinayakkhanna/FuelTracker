    *{box-sizing:border-box;margin:0;padding:0}
    :root{

    .fld{margin-bottom:13px}
    .lbl{display:block;font-size:9.5px;font-weight:700;letter-spacing:.8px;color:var(--muted);margin-bottom:5px;text-transform:uppercase}
    .inp{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--rad-sm);color:var(--txt);padding:10px 13px;font-family:var(--fn);font-size:13px;width:100%;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}

    .sr-l{color:var(--muted);font-size:12px}
    .sr-v{font-family:var(--mono);font-size:13px;font-weight:600}

    .kpi-val{font-family:var(--mono);font-size:23px;font-weight:700;line-height:1;margin-top:6px}
    .kpi-lbl{font-size:11px;color:var(--muted);margin-top:5px}

    .tg-a{background:#f59e0b12;color:var(--amber);border:1px solid #f59e0b22}
    .tg-g{background:#10b98112;color:var(--green);border:1px solid #10b98122}
    .tg-r{background:#f43f5e12;color:var(--red);border:1px solid #f43f5e22}
    .tg-b{background:#3b82f612;color:var(--blue);border:1px solid #3b82f622}

    .tg-c{background:#22d3ee12;color:var(--cyan);border:1px solid #22d3ee22}

    .s-c.active{background:var(--amber);border-color:var(--amber);color:#060400;box-shadow:0 0 18px #f59e0b40}
    .s-l{font-size:9px;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;white-space:nowrap}
    .s-l.active{color:var(--amber)}

    .leaflet-popup-close-button{color:var(--muted)!important}

    @media(max-width:920px){.rp,.chat-g,.g4{grid-template-columns:1fr!important}.g3{grid-template-columns:1fr 1fr!important}}
    @media(max-width:620px){.g2,.g3{grid-template-columns:1fr!important}.wrap{padding:14px 14px}}

</head>

function haversineKm(a,b) {
  const R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function buildWaypoints(a,b,km) {
  const pts=[{lat:a.lat,lng:a.lng}];
  const n=Math.min(7,Math.max(3,Math.floor(km/80)));
  for (let i=1;i<n;i++) {
    const t=i/n;
    pts.push({
      lat:a.lat+(b.lat-a.lat)*t+(Math.random()-0.5)*1.1,
      lng:a.lng+(b.lng-a.lng)*t+(Math.random()-0.5)*1.1,
    });
  }
  pts.push({lat:b.lat,lng:b.lng});
  return pts;
}

function efficiencyRating(mileage,fuelType) {
  if (fuelType==="electric") return {label:"EV — Zero Emission",pct:100,color:"#22d3ee",grade:"S"};
  if (mileage>=25) return {label:"Excellent",pct:88,color:"#10b981",grade:"A+"};
  if (mileage>=18) return {label:"Very Good", pct:72,color:"#10b981",grade:"A"};
  if (mileage>=13) return {label:"Good",      pct:55,color:"#f59e0b",grade:"B"};
  if (mileage>=9)  return {label:"Average",   pct:37,color:"#f97316",grade:"C"};
  return               {label:"Low",       pct:18,color:"#f43f5e",grade:"D"};
}

async function fetchJsonWithTimeout(url, opts={}, timeoutMs=10000) {
  const c = new AbortController();
  const t = setTimeout(()=>c.abort(), timeoutMs);
  try {
    const r = await fetch(url, {...opts, signal:c.signal});
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } finally { clearTimeout(t); }
}

function parseMaybeNum(v) {
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}

function normalizeCoords(p) {
  const lat = parseMaybeNum(p?.lat ?? p?.latitude ?? p?.y);
  const lng = parseMaybeNum(p?.lng ?? p?.lon ?? p?.longitude ?? p?.x);
  if (!isValidCoord(lat, lng)) return null;
  return {lat, lng, found:true};
}

function isValidCoord(lat, lng) {
  return Number.isFinite(lat) && Number.isFinite(lng) && lat>=-90 && lat<=90 && lng>=-180 && lng<=180;
}

async function geocodeWithNominatim(query) {
  const q = (query||"").trim();
  if (!q) return null;
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&countrycodes=in&q=${encodeURIComponent(q)}`;
    const data = await fetchJsonWithTimeout(url, { headers: { "Accept":"application/json" } }, 12000);
    const first = Array.isArray(data) ? data[0] : null;
    return normalizeCoords(first);
  } catch(_) { return null; }
}

async function resolveCoords(place) {
  const mapped = findCoords(place);
  if (mapped.found) return mapped;
  return (await geocodeWithNominatim(place)) || mapped;
}

async function fetchRouteMappls(a,b) {
  if (!CONFIG.MAPPLS_REST_API) return null;
  if (!isValidCoord(a?.lat, a?.lng) || !isValidCoord(b?.lat, b?.lng)) return null;
  try {
    const routePath = `https://apis.mappls.com/advancedmaps/v1/${encodeURIComponent(CONFIG.MAPPLS_REST_API)}/route_adv/driving/${a.lng},${a.lat};${b.lng},${b.lat}`;
    const url = `${routePath}?alternatives=false&steps=false&overview=full&geometries=geojson`;
    const data = await fetchJsonWithTimeout(url, {}, 12000);
    const route = data?.routes?.[0];
    const distM = parseMaybeNum(route?.distance);
    const durS = parseMaybeNum(route?.duration);
    const waypoints = toWaypoints(route?.geometry?.coordinates);
    if (!distM || !durS) return null;
    return { km: Math.round(distM/1000), durationMin: Math.max(1, Math.round(durS/60)), waypoints: waypoints?.length>1 ? waypoints : null };
  } catch(_) { return null; }
}

async function fetchRouteOsrm(a,b) {
  if (!isValidCoord(a?.lat, a?.lng) || !isValidCoord(b?.lat, b?.lng)) return null;
  try {
    const url = `https://router.project-osrm.org/route/v1/driving/${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`;
    const data = await fetchJsonWithTimeout(url, {}, 12000);
    const route = data?.routes?.[0];
    if (!route) return null;
    const waypoints = toWaypoints(route?.geometry?.coordinates);
    const distM = parseMaybeNum(route?.distance);
    const durS = parseMaybeNum(route?.duration);
    if (!distM || !durS) return null;
    return { km: Math.round(distM/1000), durationMin: Math.max(1, Math.round(durS/60)), waypoints: waypoints?.length>1 ? waypoints : null };
  } catch(_) { return null; }
}

const routeService = async (from, to, vKey, customRate, customMileage) => {
  const c1 = await resolveCoords(from);
  const c2 = await resolveCoords(to);
  if (!c1.found&&!c2.found) throw new Error("Could not locate these cities. Check spelling.");
  const [mapplsRoute, osrmRoute] = await Promise.all([fetchRouteMappls(c1,c2), fetchRouteOsrm(c1,c2)]);
  const route = mapplsRoute || osrmRoute;
  const straight=haversineKm(c1,c2);
  const km=(route?.km && route.km>0) ? route.km : Math.round(straight*1.27);
  const v=VEHICLES[vKey];
  const rate=customRate||getFuelPrice(from,v.fuelType);
  const usedMileage=customMileage||v.mileage;
  const fuelCost=v.fuelType==="electric"?Math.round(km*(v.cpk||1)):Math.round((km/usedMileage)*rate);
  const fuelUsed=v.fuelType==="electric"?0:+(km/usedMileage).toFixed(1);
  const toll=Math.round(km*1.75*v.tollM);
  const tollFreeCost=Math.round(fuelCost*1.09);
  const durationMin=route?.durationMin||Math.round(km/72*60);
  const hrs=Math.floor(durationMin/60), rem=durationMin%60;
  return {
    km, fuelCost, fuelUsed, toll, total:fuelCost+toll,
    tollFreeTotal:tollFreeCost, saving:fuelCost+toll-tollFreeCost,
    rate, fuelType:v.fuelType, mileage:usedMileage,
    duration:`${hrs>0?hrs+"h ":""}${rem}m`,
    cpkm:((fuelCost+toll)/km).toFixed(2),
    from, to, vKey,
    fromCoords:c1, toCoords:c2,
    waypoints:route?.waypoints||buildWaypoints(c1,c2,km),
    eff:efficiencyRating(usedMileage,v.fuelType),
  };
};

async function searchLocationHints(query) {
  const q = (query || "").trim();
  if (q.length < 2) return [];
  const hints = [];

  try {
    const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=8&countrycodes=in&q=${encodeURIComponent(q)}`;
    const data = await fetchJsonWithTimeout(url, { headers: { "Accept":"application/json" } }, 8000);
    (Array.isArray(data)?data:[]).forEach(s => {
      const locationDisplay = s?.display_name;
      if (locationDisplay) hints.push(locationDisplay);
    });
  } catch(_) {}

  return [...new Set(hints)].slice(0, 8);
}

  const q = state[field] || "";

    if (reqId !== hintReqSeq[field]) return;
    locationHints[field] = hints;
    if ((state[field] || "") === q) renderApp();
  }, LOCATION_SEARCH_DEBOUNCE_MS);
}

  const icon = (em,bg)=>L.divIcon({className:"",html:`<div style="width:36px;height:36px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 0 3px ${bg}44,0 4px 20px #0009;border:2px solid rgba(255,255,255,.15)">${em}</div>`,iconSize:[36,36],iconAnchor:[18,18]});
  mapLayers.mA = L.marker([result.fromCoords.lat,result.fromCoords.lng],{icon:icon("📍","#10b981")}).bindPopup(`<b style="color:#10b981;font-family:monospace">▲ ${result.from}</b>`).addTo(mapInstance);
  mapLayers.mB = L.marker([result.toCoords.lat,result.toCoords.lng],{icon:icon("🏁","#f43f5e")}).bindPopup(`<b style="color:#f43f5e;font-family:monospace">■ ${result.to}</b>`).addTo(mapInstance);
  mapInstance.fitBounds(mapLayers.poly.getBounds(),{padding:[52,52],maxZoom:9});
}

function resetRouteMap() {
  [mapLayers.poly, mapLayers.mA, mapLayers.mB].forEach(l=>{if(l) l.remove();});
  if (mapInstance) mapInstance.setView([22.5,80.5],5);
}

          </div>
        `}
      </div>
    </div>
  `;
}

function genAnalytics() {

        ${SH("Analytics", "Spending trends, breakdowns & smart savings insights")}

            <button class="btn" onclick="setTab('route')" style="font-size:12px">Plan Route</button>
            <button class="btn-o" onclick="setTab('fuellogs')" style="font-size:12px">Log Fuel</button>
          </div>
        </div></div>
      </div>
    `;
  }
  
  return `
    <div class="fin">
      ${SH("Analytics", "Spending trends, breakdowns & smart savings insights")}
      <div class="g3" style="margin-bottom:16px">
        ${[
          ["Avg Monthly", monthly.length?`₹${Math.round((monthly.reduce((s,m)=>s+m.fuel+m.toll,0))/monthly.length).toLocaleString("en-IN")}`:"—","var(--amber)"],
          ["Cost per km", stats.td?`₹${(stats.total/stats.td).toFixed(2)}`:"—","var(--teal)"],
          ["Fuel vs Total", stats.total?`${Math.round(((stats.tf+stats.fls)/stats.total)*100)}% fuel`:"—","var(--violet)"]
        ].map(([l,v,c])=>`
          <div class="card" style="text-align:center">
            <div style="font-family:var(--mono);font-size:24px;font-weight:700;color:${c}">${v}</div>
            <div style="color:var(--muted);font-size:11px;margin-top:5px">${l}</div>
          </div>
        `).join('')}
      </div>
      
      <div class="g2" style="margin-bottom:16px">
        <div class="card">
          ${CT("📈 Monthly Spend Trend", "amber")}
          ${monthly.length>0?`<div style="height:200px;position:relative"><canvas id="chartArea"></canvas></div>`:`<div class="empty"><div style="opacity:.12;font-size:26px">📈</div><div style="font-size:12px;color:var(--muted)">Save more trips to see trend</div></div>`}
        </div>
        <div class="card">
          ${CT("🥧 Expense Split", "teal")}
          ${stats.total>0?`
            <div style="height:150px;position:relative"><canvas id="chartPie"></canvas></div>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px">
              ${[["Trip Fuel",stats.tf,PC[0]],["Toll",stats.tt,PC[1]],["Fuel Log",stats.fls,PC[2]]].filter(d=>d[1]>0).map(([n,v,c])=>`
                <div style="text-align:center">
                  <div style="color:${c};font-size:10px;display:flex;align-items:center;gap:4px"><span style="width:7px;height:7px;border-radius:50%;background:${c};display:inline-block"></span>${n}</div>
                  <div style="font-family:var(--mono);font-weight:700;font-size:13px;margin-top:2px">₹${Math.round(v).toLocaleString("en-IN")}</div>
                </div>
              `).join('')}

          `:`<div class="empty"><div style="opacity:.12;font-size:26px">🥧</div><div style="font-size:12px;color:var(--muted)">No spend data yet</div></div>`}
        </div>
      </div>
      
      ${monthly.length>0?`
        <div class="card" style="margin-bottom:16px">
          ${CT("📊 Monthly Bar Chart", "blue")}
          <div style="height:210px;position:relative"><canvas id="chartBar"></canvas></div>
        </div>
      `:''}
      
      <div class="card" style="border-color:#f59e0b22">
        ${CT("💡 Smart Insights", "amber")}
        <div style="display:flex;flex-direction:column;gap:9px">
          ${[
            stats.td>0?`You've driven ${Math.round(stats.td).toLocaleString("en-IN")} km across ${state.trips.length} trip${state.trips.length!==1?"s":""} — avg ₹${state.trips.length?Math.round(stats.total/state.trips.length).toLocaleString("en-IN"):"0"} per trip.`:null,
            stats.tt&&stats.total?`Tolls are ${Math.round((stats.tt/stats.total)*100)}% of your total — consider state highways for hops under 100 km.`:null,
            stats.flL>0?`You've filled ${stats.flL.toFixed(0)}L at avg ₹${stats.avgP.toFixed(2)}/L. Filling in Chandigarh (₹94.24) vs Nagpur (₹110.89) saves ₹${Math.round(stats.flL*(110.89-94.24)).toLocaleString("en-IN")}.`:null,

          ].filter(Boolean).map(tip=>`
            <div style="display:flex;gap:11px;padding:10px 13px;background:var(--bg);border-radius:10px;border:1px solid var(--bdr);font-size:12px;line-height:1.7">
              <span style="color:var(--amber);flex-shrink:0">💡</span><span style="color:var(--muted)">${tip}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

          <div>
            <div style="font-weight:700;font-size:14px">FuelTrack AI</div>

      <div style="display:flex;flex-direction:column;gap:13px">
        <div class="card">

            ${["How to improve mileage?","Cheapest petrol city India?","NH48 Delhi–Mumbai toll cost?","CNG vs Petrol per km savings?","EV vs petrol car economics?","FASTag rules & penalties?","Best highway driving speed?"].map(q=>`

          ${SR("Total Spent", stats.total?`₹${stats.total.toLocaleString("en-IN")}`:"₹0", "var(--amber)")}
          ${SR("Vehicle", VEHICLES[state.vKey]?.label, "var(--muted)")}

      </div>

function renderHeader() {
  const stats = getStats();
  document.getElementById('hdr_trips_count').innerText = `${state.trips.length} trips ·`;
  document.getElementById('hdr_total_spend').innerText = `₹${stats.total.toLocaleString("en-IN")}`;
  document.getElementById('hdr_vkey').innerHTML = `${VEHICLES[state.vKey]?.icon} ${VEHICLES[state.vKey]?.label}`;
  
  const mapDot = document.getElementById('hdr_map_dot');
  const mapTxt = document.getElementById('hdr_map_txt');
  if(mapDot) mapDot.style.background = state.leafReady ? "var(--teal)" : "var(--red)";
  if(mapTxt) { mapTxt.style.color = state.leafReady ? "var(--teal)" : "var(--red)"; mapTxt.innerText = state.leafReady ? "Map Live" : "Loading"; }

  const navHtml = [
    ["route","🗺️","Route Planner",0],
    ["fuellogs","⛽","Fuel Logs",state.fuelLog.length],
    ["dashboard","📊","Dashboard",0],
    ["analytics","📈","Analytics",0],
    ["ai","🤖","AI Chat",0],
  ].map(([id,ic,lb,ct])=>`
    <button class="ntab${state.tab===id?' on':''}" onclick="setTab('${id}')">
      <span>${ic}</span><span>${lb}</span>
      ${ct>0?`<span class="nbadge">${ct}</span>`:''}
    </button>
  `).join('');
  document.getElementById('main_nav').innerHTML = navHtml;
}

  const emptyContainer = document.getElementById('map_empty');
  if(!overlayContainer || !emptyContainer) return;

  if (state.rResult) {
    emptyContainer.innerHTML = '';
    overlayContainer.innerHTML = `
      <div class="moverlay" style="top:12px;left:12px;display:flex;flex-direction:column;gap:7px">
        <div class="mchip"><span style="color:var(--green)">📍</span><span style="color:var(--txt);font-weight:600">${escapeHTML(state.rResult.from)}</span></div>
        <div class="mchip"><span style="color:var(--red)">🏁</span><span style="color:var(--txt);font-weight:600">${escapeHTML(state.rResult.to)}</span></div>
      </div>
      <div class="moverlay" style="top:12px;right:12px;display:flex;flex-direction:column;align-items:flex-end;gap:7px">
        <div class="mchip">
          <span style="color:var(--amber);font-weight:700">${state.rResult.km} km</span>
          <span style="color:var(--dim)">·</span>
          <span style="color:var(--violet)">${state.rResult.duration}</span>
        </div>
        <div class="mchip">
          <span style="color:var(--green)">₹${state.rResult.fuelCost.toLocaleString("en-IN")}</span>
          <span style="color:var(--dim)">fuel +</span>
          <span style="color:var(--red)">₹${state.rResult.toll.toLocaleString("en-IN")}</span>
          <span style="color:var(--dim)">toll</span>
        </div>
      </div>
      <div class="moverlay" style="bottom:12px;left:12px">
        <div class="mchip" style="gap:10px">
          <span style="display:inline-flex;align-items:center;gap:5px">
            <span style="display:inline-block;width:18px;height:3px;border-radius:2px;background:var(--amber)"></span>
            <span style="color:var(--muted);font-size:10px">Toll Route</span>
          </span>
          <span class="tag tg-a">Live</span>
        </div>
      </div>
    `;
  } else {
    overlayContainer.innerHTML = '';
    emptyContainer.innerHTML = `
      <div style="font-size:56px;opacity:.1">🗺️</div>

        ${state.rLoading ? `<span class="spin">↻</span> Plotting route on map…` : `Configure your trip to see the live route`}

function toWaypoints(coords) {
  if (!Array.isArray(coords)) return null;
  const pts = coords.map(([lng,lat])=>({lat,lng})).filter(p=>isValidCoord(p.lat, p.lng));
  return pts.length > 1 ? pts : null;
}

function renderCharts() {
  if (state.tab !== 'analytics') return;
  setTimeout(() => {
    const data = getMonthly();
    const stats = getStats();
    
    // Area Chart (Recharts clone)
    const ctxA = document.getElementById('chartArea');
    if (ctxA) {
      if(areaChartInst) areaChartInst.destroy();
      areaChartInst = new Chart(ctxA, {
        type: 'line',
        data: {
          labels: data.map(d=>d.month),
          datasets: [
            {label:'Fuel', data:data.map(d=>d.fuel), borderColor:'#f59e0b', backgroundColor:'rgba(245,158,11,0.2)', fill:true, tension:0.4, pointRadius:3, borderWidth:2.5},
            {label:'Toll', data:data.map(d=>d.toll), borderColor:'#f43f5e', backgroundColor:'rgba(244,63,94,0.2)', fill:true, tension:0.4, pointRadius:3, borderWidth:2}
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { x: { grid: {display:false}, ticks: {color:'var(--muted)'} }, y: { grid: {color:'var(--faint)'}, ticks: {color:'var(--muted)'} } },
          plugins: { legend: {display:false}, tooltip: {mode: 'index', intersect: false} }
        }
      });
    }

    // Pie Chart
    const ctxP = document.getElementById('chartPie');
    if (ctxP) {
      if(pieChartInst) pieChartInst.destroy();
      const pData = [{name:"Trip Fuel",value:stats.tf},{name:"Toll",value:stats.tt},{name:"Fuel Log",value:stats.fls}].filter(d=>d.value>0);
      pieChartInst = new Chart(ctxP, {
        type: 'doughnut',
        data: {
          labels: pData.map(d=>d.name),
          datasets: [{ data: pData.map(d=>d.value), backgroundColor: PC, borderWidth: 0 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '70%',
          plugins: { legend: {display:false}, tooltip:{callbacks:{label: c => `₹${Math.round(c.raw).toLocaleString("en-IN")}`}} }
        }
      });
    }

    // Bar Chart
    const ctxB = document.getElementById('chartBar');
    if (ctxB) {
      if(barChartInst) barChartInst.destroy();
      barChartInst = new Chart(ctxB, {
        type: 'bar',
        data: {
          labels: data.map(d=>d.month),
          datasets: [
            {label:'Fuel', data:data.map(d=>d.fuel), backgroundColor:'#f59e0b', borderRadius:{topLeft:5,topRight:5}},
            {label:'Toll', data:data.map(d=>d.toll), backgroundColor:'#f43f5e', borderRadius:{topLeft:5,topRight:5}}
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { x: { grid: {display:false}, ticks: {color:'var(--muted)'} }, y: { grid: {color:'var(--faint)'}, ticks: {color:'var(--muted)'} } },
          plugins: { legend: {display:false}, tooltip: {mode: 'index', intersect: false} }
        }
      });
    }
  }, 50);
}

function renderApp() {
  const activeEl = document.activeElement;
  const activeId = activeEl ? activeEl.id : null;
  let cursorStart = null, cursorEnd = null;

  if (activeId && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA') && activeEl.type !== 'radio' && activeEl.type !== 'checkbox') {
    try { cursorStart = activeEl.selectionStart; cursorEnd = activeEl.selectionEnd; } catch(e) {}
  }

  renderHeader();
  document.getElementById('tab_route').style.display = state.tab === 'route' ? 'block' : 'none';
  document.getElementById('tab_fuellogs').style.display = state.tab === 'fuellogs' ? 'block' : 'none';
  document.getElementById('tab_dashboard').style.display = state.tab === 'dashboard' ? 'block' : 'none';
  document.getElementById('tab_analytics').style.display = state.tab === 'analytics' ? 'block' : 'none';
  document.getElementById('tab_ai').style.display = state.tab === 'ai' ? 'block' : 'none';

  if(state.tab === 'route') { document.getElementById('route_left_pane').innerHTML = genRouteLeft(); renderMapOverlays(); }
  if(state.tab === 'fuellogs') document.getElementById('tab_fuellogs').innerHTML = genFuelLogs();
  if(state.tab === 'dashboard') document.getElementById('tab_dashboard').innerHTML = genDashboard();
  if(state.tab === 'analytics') { document.getElementById('tab_analytics').innerHTML = genAnalytics(); renderCharts(); }
  if(state.tab === 'ai') { 
    document.getElementById('tab_ai').innerHTML = genAiChat(); 
    setTimeout(() => { const ce = document.getElementById('chatEndRef'); if (ce) ce.scrollIntoView({behavior: "smooth"}); }, 50);
  }

  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) { el.focus(); try { if (cursorStart !== null) el.setSelectionRange(cursorStart, cursorEnd); } catch(e) {} }
  }
}

// Init
window.onload = () => {
  state.leafReady = !!window.L;
  renderApp();
  if(state.leafReady && state.tab === 'route') setTimeout(initMap, 80);
};
</script>
